	<script>
	var globalCounter = 1;
	Effect.Pulsate('hiThere', { pulses: 15, duration: 3.0 });
	
	function onClick (element) {
    //visual effect
    var yValue = element.offsetTop;
    new Effect.Parallel([
       new Effect.Morph(element, {sync: true, style: 'bottom: 20px; width: 20px; height: 25px', transition: Effect.Transitions.pulse}),
       new Effect.Opacity(element, {sync: true, from: 1, to: 0})
       ], {duration: 1.0});
 
	new Effect.Morph(element, {style: 'top: ' + yValue + 'px; width: 255px; height: 255px', transition: Effect.Transitions.full, delay: 1.8});
    
	var fileNumber = globalCounter % 2 + 1;	
	globalCounter++;
	
	document.getElementById("myFace").src = "kevin" + fileNumber.toString() + ".jpg";
	new Effect.Opacity(element, {from: 0, to: 1, delay: 1.8});
}
